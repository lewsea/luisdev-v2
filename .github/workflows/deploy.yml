name: Deploy theme to live site

# Builds the Sage theme and uploads it via FTP whenever the `main` branch
# changes — or when triggered manually from the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER     e.g. ftp.your-host.com
#   FTP_USERNAME   FTP login
#   FTP_PASSWORD   FTP password
#
# Optional repository variables (Settings → Secrets and variables → Actions → Variables):
#   FTP_SERVER_DIR Remote target dir. Defaults to /public_html/wp-content/themes/online-projects/

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & FTP deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Audit Composer dependencies for known CVEs
        run: composer audit

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Ensure no Vite hot file is deployed
        run: rm -f public/hot

      - name: Check if vendor deploy is needed
        id: vendor-check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             ! git rev-parse HEAD^ >/dev/null 2>&1 || \
             git diff --name-only HEAD^ HEAD -- composer.lock | grep -q composer.lock; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy vendor via FTP
        if: steps.vendor-check.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./vendor/
          server-dir: /wp-content/themes/luisdev/vendor/

      - name: Deploy theme files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /wp-content/themes/luisdev/
          # Mirror only what the running theme needs, skip dev / VCS / local files.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/.vscode/**
            **/.idea/**
            **/.DS_Store
            **/Thumbs.db
            **/.env
            **/.env.*
            **/*.log
            **/tests/**
            **/.editorconfig
            **/.gitignore
            **/.gitattributes
            **/.prettierrc*
            **/.eslintrc*
            **/phpunit.xml*
            **/pint.json
            **/AGENTS.md
            **/TODO.md
            **/README.md
            **/LICENSE.md
            **/package.json
            **/package-lock.json
            **/composer.json
            **/composer.lock
            **/vite.config.js
            **/online-projects-agentbox
            **/online-projects-agentbox/**
            **/resources/js/**
            **/resources/css/**
            **/resources/images/**
            **/resources/fonts/**
            **/storage/framework/cache/**
            **/storage/framework/views/**
